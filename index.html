<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTools Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar sticky-top bg-body-tertiary border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="">
                <i class="bi bi-grid-1x2-fill me-2 text-primary"></i>MyTools
            </a>
            <div class="search-container mx-auto d-none d-md-block">
                <i class="bi bi-search"></i>
                <input type="text" id="toolSearch" class="form-control search-input" placeholder="Tìm kiếm công cụ...">
            </div>
            <button class="theme-toggle" id="themeBtn" aria-label="Chuyển chế độ sáng/tối">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-3 mb-5 justify-content-center">
            <div class="col-md-3">
                <div class="stat-card stat-clickable active" data-filter="all">
                    <div class="stat-title"><i class="bi bi-box-seam me-2"></i>Tổng số</div>
                    <div class="stat-value" id="totalTools">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-clickable" data-filter="favorites">
                    <div class="stat-title"><i class="bi bi-star me-2"></i>Yêu thích</div>
                    <div class="stat-value" id="totalFavorites">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-clickable" data-filter="recent">
                    <div class="stat-title"><i class="bi bi-clock-history me-2"></i>Gần đây</div>
                    <div class="stat-value" id="totalRecent">0</div>
                </div>
            </div>
        </div>

        <div id="noResults" class="text-center py-5" style="display: none;">
            <i class="bi bi-search" style="font-size: 3rem; color: #888;"></i>
            <p class="mt-3 text-muted">Không tìm thấy công cụ nào phù hợp</p>
        </div>

        <div class="dashboard-grid" id="toolsGrid"></div>
    </div>

    <footer class="footer-simple bg-body-tertiary border-top py-4 mt-auto">
        <div class="container text-center">
            <span class="text-muted small">
                Made with <i class="bi bi-heart-fill text-danger mx-1"></i> by <strong>QuyCo</strong>
            </span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
